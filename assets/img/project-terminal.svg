<svg xmlns="http://www.w3.org/2000/svg" width="600" height="340" viewBox="0 0 600 340">
  <rect width="600" height="340" fill="#313244"/>
  <rect x="20" y="20" width="560" height="300" rx="8" fill="#1e1e2e"/>
  <circle cx="50" cy="50" r="6" fill="#f38ba8"/>
  <circle cx="70" cy="50" r="6" fill="#fab387"/>
  <circle cx="90" cy="50" r="6" fill="#a6e3a1"/>
  <text x="120" y="55" font-family="monospace" font-size="14" fill="#cdd6f4">project-terminal — main</text>
  <rect x="30" y="75" width="540" height="1" fill="#45475a"/>
  <text x="40" y="105" font-family="monospace" font-size="13" fill="#6c7086">$</text>
  <text x="55" y="105" font-family="monospace" font-size="13" fill="#cdd6f4">./build.sh</text>
  <text x="40" y="130" font-family="monospace" font-size="13" fill="#a6e3a1">[INFO] Building project...</text>
  <text x="40" y="155" font-family="monospace" font-size="13" fill="#a6e3a1">[INFO] Compiling source files...</text>
